<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Pregunta al Banco</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], textarea, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #003366; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #00509e; }
        a{
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }
        .return{
            background-color: #003366;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Añadir Nueva Pregunta</h2>
        <form method="POST">
            <div class="form-group">
                <label>Materia:</label>
                <select name="materia" required>
                    <option value="Matemáticas">Matemáticas</option>
                    <option value="Física">Física</option>
                    <option value="Química">Química</option>
                    <option value="Competencia Escrita">Competencia Escrita</option>
                    <option value="Competencia Lectora">Competencia Lectora</option>
                    <option value="Historia">Historia</option>
                    <option value="Inglés">Inglés</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Pregunta:</label>
                <textarea name="texto_pregunta" rows="3" required></textarea>
            </div>

            <div class="form-group"><label>Opción A:</label><input type="text" name="opcion_a" required></div>
            <div class="form-group"><label>Opción B:</label><input type="text" name="opcion_b" required></div>
            <div class="form-group"><label>Opción C:</label><input type="text" name="opcion_c" required></div>
            <div class="form-group"><label>Opción D:</label><input type="text" name="opcion_d" required></div>

            <div class="form-group">
                <label>Respuesta Correcta:</label>
                <select name="respuesta_correcta" required>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>

            <div class="form-group">
                <label>Procedimiento / Ayuda (Opcional):</label>
                <textarea name="procedimiento" rows="4"></textarea>
            </div>

            <button type="submit">Guardar Pregunta</button>
        </form>
        <br> <br> <button class="return"><a href="/">Regresar a la pagina principal</a></button>
    </div>
</body>
</html>
