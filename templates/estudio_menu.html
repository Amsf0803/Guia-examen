<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Material de Estudio - Simulador</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        h1 { color: #003366; text-align: center; }
        .materia-seccion { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; max-width: 800px; margin-left: auto; margin-right: auto;}
        .materia-titulo { color: #00509e; border-bottom: 2px solid #00509e; padding-bottom: 10px; }
        .tema-link { display: block; padding: 12px; margin: 8px 0; background-color: #e9ecef; color: #333; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .tema-link:hover { background-color: #003366; color: white; transform: translateX(10px); }
        .btn-volver { display: block; text-align: center; margin-top: 30px; font-weight: bold; color: #003366; text-decoration: none;}
    </style>
</head>
<body>

    <h1>📚 Material de Estudio ({{ nivel }})</h1>
    <p style="text-align: center; color: #555;">Selecciona un tema del temario oficial para estudiar la teoría y ver ejemplos resueltos.</p>

    {% for materia, temas in temario.items() %}
    <div class="materia-seccion">
        <h2 class="materia-titulo">{{ materia }}</h2>
        {% for tema in temas %}
            <a href="{{ url_for('detalle_estudio', nivel=nivel, materia=materia, tema_id=tema.id) }}" class="tema-link">
                📖 {{ tema.titulo }}
            </a>
        {% endfor %}
    </div>
    {% endfor %}

    <a href="{{ url_retorno }}" class="btn-volver">⬅ Volver al Menú Principal</a>

</body>
</html>
